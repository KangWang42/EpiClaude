<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 900"
  font-family="Source Han Sans SC, Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#737B77"/>
    </marker>
  </defs>
  <rect data-role="canvas" x="0" y="0" width="1300" height="900" fill="#FFFFFF"/>

  <rect id="baseline" data-role="flow-main" data-tone="primary" data-layer="main" x="400" y="35" width="500" height="90" rx="1"
    fill="#E7F1ED" stroke="#3D7467" stroke-width="1.5"/>
  <text data-role="flow-label" x="650" y="73" text-anchor="middle" fill="#333A37" font-size="24" font-weight="500">基线参与者</text>
  <text data-role="flow-label" x="650" y="104" text-anchor="middle" fill="#333A37" font-size="22" font-weight="400">n = 1,560</text>

  <rect id="eligible" data-role="flow-main" data-tone="primary" data-layer="main" x="400" y="215" width="500" height="90" rx="1"
    fill="#E7F1ED" stroke="#3D7467" stroke-width="1.5"/>
  <text data-role="flow-label" x="650" y="253" text-anchor="middle" fill="#333A37" font-size="24" font-weight="500">符合研究资格</text>
  <text data-role="flow-label" x="650" y="284" text-anchor="middle" fill="#333A37" font-size="22" font-weight="400">n = 1,412</text>

  <rect id="followup" data-role="flow-main" data-tone="primary" data-layer="main" x="400" y="395" width="500" height="90" rx="1"
    fill="#E7F1ED" stroke="#3D7467" stroke-width="1.5"/>
  <text data-role="flow-label" x="650" y="433" text-anchor="middle" fill="#333A37" font-size="24" font-weight="500">进入随访分析</text>
  <text data-role="flow-label" x="650" y="464" text-anchor="middle" fill="#333A37" font-size="22" font-weight="400">n = 1,350</text>

  <rect id="exclude-eligibility" data-role="flow-exclusion" data-tone="secondary" data-layer="exclusions" x="980" y="130" width="270" height="90" rx="1"
    fill="#F8F1E6" stroke="#B98543" stroke-width="1.25"/>
  <text data-role="flow-label" x="1115" y="168" text-anchor="middle" fill="#333A37" font-size="20" font-weight="400">排除：不符合资格</text>
  <text data-role="flow-label" x="1115" y="197" text-anchor="middle" fill="#333A37" font-size="19" font-weight="400">n = 148</text>

  <rect id="exclude-followup" data-role="flow-exclusion" data-tone="secondary" data-layer="exclusions" x="980" y="310" width="270" height="90" rx="1"
    fill="#F8F1E6" stroke="#B98543" stroke-width="1.25"/>
  <text data-role="flow-label" x="1115" y="348" text-anchor="middle" fill="#333A37" font-size="20" font-weight="400">排除：随访资料不完整</text>
  <text data-role="flow-label" x="1115" y="377" text-anchor="middle" fill="#333A37" font-size="19" font-weight="400">n = 62</text>

  <rect id="without-outcome" data-role="flow-terminal" data-tone="primary" data-layer="outcomes" x="170" y="700" width="400" height="120" rx="1"
    fill="#E7F1ED" stroke="#3D7467" stroke-width="1.5"/>
  <text data-role="flow-label" x="370" y="749" text-anchor="middle" fill="#333A37" font-size="23" font-weight="500">随访期间未发生结局</text>
  <text data-role="flow-label" x="370" y="785" text-anchor="middle" fill="#333A37" font-size="21" font-weight="400">n = 1,028</text>

  <rect id="with-outcome" data-role="flow-terminal" data-tone="critical" data-layer="outcomes" x="730" y="700" width="400" height="120" rx="1"
    fill="#F7E8E6" stroke="#B45F55" stroke-width="1.5"/>
  <text data-role="flow-label" x="930" y="749" text-anchor="middle" fill="#333A37" font-size="23" font-weight="500">随访期间发生结局</text>
  <text data-role="flow-label" x="930" y="785" text-anchor="middle" fill="#333A37" font-size="21" font-weight="400">n = 322</text>

  <path data-role="connector" data-arrow="true" d="M650 125 V215" fill="none" stroke="#737B77" stroke-width="1.75" marker-end="url(#arrow)"/>
  <path data-role="connector" data-arrow="true" d="M650 175 H980" fill="none" stroke="#737B77" stroke-width="1.75" marker-end="url(#arrow)"/>
  <path data-role="connector" data-arrow="true" d="M650 305 V395" fill="none" stroke="#737B77" stroke-width="1.75" marker-end="url(#arrow)"/>
  <path data-role="connector" data-arrow="true" d="M650 355 H980" fill="none" stroke="#737B77" stroke-width="1.75" marker-end="url(#arrow)"/>
  <path data-role="connector" data-arrow="false" d="M650 485 V590" fill="none" stroke="#737B77" stroke-width="1.75"/>
  <path data-role="connector" data-arrow="false" d="M370 590 H930" fill="none" stroke="#737B77" stroke-width="1.75"/>
  <path data-role="connector" data-arrow="true" d="M370 590 V700" fill="none" stroke="#737B77" stroke-width="1.75" marker-end="url(#arrow)"/>
  <path data-role="connector" data-arrow="true" d="M930 590 V700" fill="none" stroke="#737B77" stroke-width="1.75" marker-end="url(#arrow)"/>
</svg>
